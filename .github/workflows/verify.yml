name: OMEGA Verify
on:
  push:
  pull_request:
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install
        run: npm ci
      - name: Build
        run: npx tsc
      - name: Run Deterministic Pipeline
        run: node scripts/run.js
      - name: Verify Snapshot
        run: node scripts/verify.js
